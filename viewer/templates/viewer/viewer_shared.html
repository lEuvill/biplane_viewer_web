{% extends "viewer/base.html" %}
{% block title %}3D Viewer — Biplane{% endblock %}

{% block content %}
<div class="viewer-layout viewer-layout--shared">

  <!-- ── Canvas area (full width, no panel) ────────────── -->
  <div class="viewer-canvas-wrap" id="canvas-wrap">
    <canvas id="three-canvas"></canvas>

    <!-- Header overlay (top of canvas) -->
    <div class="canvas-header">
      <span id="hdr-frame">Frame 1 / {{ n_frames }}</span>
      <div class="hdr-controls">
        <button id="prev-btn" class="hdr-btn" title="Previous frame">&#9664;</button>
        <button id="play-btn" class="hdr-btn hdr-play-btn">&#9654;&#160;&#160;Play</button>
        <button id="next-btn" class="hdr-btn" title="Next frame">&#9654;</button>
      </div>
      <span id="hdr-mode" class="mode-badge">STACK</span>
    </div>

    <!-- Frame slider bar -->
    <div class="canvas-frame-bar">
      <input type="range" id="frame-slider" min="0" max="{{ n_frames|add:'-1' }}" value="0" step="1">
      <span class="sl-val" id="frame-val">1</span>
    </div>

    <!-- Shared controls bar: display mode + FPS -->
    <div class="canvas-shared-bar">
      <div class="shared-bar-group">
        <span class="shared-bar-label">MODE</span>
        <label class="shared-radio"><input type="radio" name="mode" value="stack" checked> Stack</label>
        <label class="shared-radio"><input type="radio" name="mode" value="single"> Single</label>
      </div>
      <div class="shared-bar-group">
        <span class="shared-bar-label">FPS</span>
        <input type="range" id="fps-slider" min="4" max="60" value="12" step="1" style="width:80px">
        <span class="sl-val" id="fps-val">12</span>
      </div>
    </div>

    <!-- ViewCube -->
    <canvas id="viewcube-canvas"></canvas>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="loading-overlay">
      <div class="loading-box">
        <div class="spinner"></div>
        <div id="load-phase">Initialising…</div>
        <div class="progress-bar-wrap">
          <div id="progress-bar" class="progress-bar" style="width:0%"></div>
        </div>
        <div id="load-pct">0%</div>
      </div>
    </div>
  </div>

</div><!-- /viewer-layout -->
{% endblock %}

{% block scripts %}
<script>
  window.VIEWER_CONFIG = {
    studyId:    "{{ study_id }}",
    cacheId:    "{{ cache_id }}",
    nFrames:    {{ n_frames }},
    cursorFrac: {{ cursor_frac }},
    jobId:      "{{ job_id }}",
    shared:     true,
  };
</script>
{% load static %}
<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module" src="{% static 'js/viewer.js' %}"></script>
{% endblock %}
