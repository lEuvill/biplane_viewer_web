{% extends "viewer/base.html" %}
{% block title %}3D Viewer — Biplane{% endblock %}

{% block content %}
<div class="viewer-layout">

  <!-- Left panel -->
  <div class="viewer-panel" id="panel">

    <div class="panel-section">
      <label class="panel-label">Display Mode</label>
      <div class="radio-group">
        <label><input type="radio" name="mode" value="stack" checked> Stack</label>
        <label><input type="radio" name="mode" value="single"> Single</label>
      </div>
    </div>

    <div class="panel-section">
      <label class="panel-label">Frame <span id="frame-num">0</span> / <span id="frame-total">{{ n_frames }}</span></label>
      <input type="range" id="frame-slider" min="0" max="{{ n_frames|add:'-1' }}" value="0" step="1">
    </div>

    <div class="panel-section">
      <label class="panel-label">Sagittal X offset</label>
      <input type="range" id="sag-slider" min="0" max="300" value="{{ cursor_frac|floatformat:0 }}" step="1">
    </div>

    <div class="panel-section">
      <label class="panel-label">Camera</label>
      <div class="btn-group">
        <button class="cam-btn" data-preset="perspective">3D</button>
        <button class="cam-btn" data-preset="top">Top</button>
        <button class="cam-btn" data-preset="front">Front</button>
        <button class="cam-btn" data-preset="side">Side</button>
      </div>
    </div>

    <div class="panel-section">
      <label class="panel-label">Playback</label>
      <div class="btn-group">
        <button id="play-btn">&#9654; Play</button>
        <button id="stop-btn">&#9646;&#9646; Stop</button>
      </div>
      <label class="panel-label" style="margin-top:8px">Speed (fps)</label>
      <input type="range" id="fps-slider" min="1" max="30" value="10" step="1">
      <span id="fps-val">10</span>
    </div>

  </div>

  <!-- 3D Canvas -->
  <div class="viewer-canvas-wrap">
    <canvas id="three-canvas"></canvas>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="loading-overlay">
      <div class="loading-box">
        <div class="spinner"></div>
        <div id="load-phase">Initialising…</div>
        <div class="progress-bar-wrap">
          <div id="progress-bar" class="progress-bar" style="width:0%"></div>
        </div>
        <div id="load-pct">0%</div>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<!-- Three.js from CDN -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

// ── Constants (match desktop constants.py) ────────────────────────────────
const PROC_W    = 300;
const PROC_H    = 300;
const Z_SPACING = 3.0;
const TR_OPACITY = 0.45;
const SAG_Z     = 300;

const STUDY_ID   = "{{ study_id }}";
const N_FRAMES   = {{ n_frames }};
const CURSOR_FRAC = {{ cursor_frac }};

// ── Three.js setup ────────────────────────────────────────────────────────
const canvas   = document.getElementById("three-canvas");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x0d0d0d);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0d);
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 10000);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Resize handler
function resize() {
  const wrap = canvas.parentElement;
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  camera.aspect = wrap.clientWidth / wrap.clientHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);
resize();

// Render loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ── Camera presets ────────────────────────────────────────────────────────
const cx = PROC_W / 2, cy = PROC_H / 2, cz = (N_FRAMES - 1) * Z_SPACING / 2;
controls.target.set(cx, cy, cz);

const PRESETS = {
  perspective: { pos: [cx + 450, cy + 350, cz + 500], up: [0, 1, 0] },
  top:         { pos: [cx, cy + 800, cz],              up: [0, 0, -1] },
  front:       { pos: [cx, cy, cz - 600],              up: [0, 1, 0] },
  side:        { pos: [cx + 600, cy, cz],              up: [0, 1, 0] },
};

function applyPreset(name) {
  const p = PRESETS[name];
  camera.position.set(...p.pos);
  camera.up.set(...p.up);
  controls.target.set(cx, cy, cz);
  controls.update();
}
applyPreset("perspective");

// ── Scene objects ─────────────────────────────────────────────────────────
let stackMeshes  = [];   // transverse planes
let sagMesh      = null; // sagittal plane
let currentFrame = 0;
let displayMode  = "stack";

const loader = new THREE.TextureLoader();

function frameUrl(idx, plane) {
  return `/api/frames/${STUDY_ID}/${idx}/${plane}/`;
}

function buildStack() {
  // Remove old
  stackMeshes.forEach(m => scene.remove(m));
  stackMeshes = [];

  for (let i = 0; i < N_FRAMES; i++) {
    const geo = new THREE.PlaneGeometry(PROC_W, PROC_H);
    const mat = new THREE.MeshBasicMaterial({
      map: loader.load(frameUrl(i, "trans")),
      transparent: true,
      opacity: TR_OPACITY,
      side: THREE.DoubleSide,
      depthWrite: false,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(PROC_W / 2, PROC_H / 2, i * Z_SPACING);
    scene.add(mesh);
    stackMeshes.push(mesh);
  }
}

function buildSingle(idx) {
  stackMeshes.forEach(m => scene.remove(m));
  stackMeshes = [];

  const geo = new THREE.PlaneGeometry(PROC_W, PROC_H);
  const mat = new THREE.MeshBasicMaterial({
    map: loader.load(frameUrl(idx, "trans")),
    transparent: true,
    opacity: 1.0,
    side: THREE.DoubleSide,
    depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(PROC_W / 2, PROC_H / 2, idx * Z_SPACING);
  scene.add(mesh);
  stackMeshes.push(mesh);
}

function buildSagittal(frameIdx, xOffset) {
  if (sagMesh) scene.remove(sagMesh);

  const geo = new THREE.PlaneGeometry(SAG_Z, PROC_H);
  // Rotate 90° around Y so it stands vertical along the Z axis
  geo.applyMatrix4(new THREE.Matrix4().makeRotationY(Math.PI / 2));

  const mat = new THREE.MeshBasicMaterial({
    map: loader.load(frameUrl(frameIdx, "sag")),
    transparent: true,
    opacity: 0.7,
    side: THREE.DoubleSide,
    depthWrite: false,
  });
  sagMesh = new THREE.Mesh(geo, mat);
  sagMesh.position.set(xOffset, PROC_H / 2, SAG_Z / 2);
  scene.add(sagMesh);
}

// ── Controls wiring ───────────────────────────────────────────────────────
const frameSlider = document.getElementById("frame-slider");
const sagSlider   = document.getElementById("sag-slider");
const frameNum    = document.getElementById("frame-num");

// Init sagittal X from cursor fraction
sagSlider.value = Math.round(CURSOR_FRAC * PROC_W);

frameSlider.addEventListener("input", () => {
  currentFrame = parseInt(frameSlider.value);
  frameNum.textContent = currentFrame;
  if (displayMode === "single") buildSingle(currentFrame);
  buildSagittal(currentFrame, parseInt(sagSlider.value));
});

sagSlider.addEventListener("input", () => {
  buildSagittal(currentFrame, parseInt(sagSlider.value));
});

document.querySelectorAll("input[name=mode]").forEach(r => {
  r.addEventListener("change", () => {
    displayMode = r.value;
    if (displayMode === "stack")  buildStack();
    else                          buildSingle(currentFrame);
    buildSagittal(currentFrame, parseInt(sagSlider.value));
  });
});

document.querySelectorAll(".cam-btn").forEach(btn => {
  btn.addEventListener("click", () => applyPreset(btn.dataset.preset));
});

// Playback
let playTimer = null;
const fpsSlider = document.getElementById("fps-slider");
const fpsVal    = document.getElementById("fps-val");
fpsSlider.addEventListener("input", () => {
  fpsVal.textContent = fpsSlider.value;
  if (playTimer) startPlay();
});

function startPlay() {
  stopPlay();
  const fps = parseInt(fpsSlider.value);
  playTimer = setInterval(() => {
    currentFrame = (currentFrame + 1) % N_FRAMES;
    frameSlider.value = currentFrame;
    frameNum.textContent = currentFrame;
    if (displayMode === "single") buildSingle(currentFrame);
    buildSagittal(currentFrame, parseInt(sagSlider.value));
  }, 1000 / fps);
}
function stopPlay() {
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
}

document.getElementById("play-btn").addEventListener("click", startPlay);
document.getElementById("stop-btn").addEventListener("click", stopPlay);

// ── Loading / WebSocket ───────────────────────────────────────────────────
const overlay   = document.getElementById("loading-overlay");
const phaseEl   = document.getElementById("load-phase");
const pctEl     = document.getElementById("load-pct");
const barEl     = document.getElementById("progress-bar");

function setProgress(pct, label) {
  barEl.style.width = pct + "%";
  pctEl.textContent = Math.round(pct) + "%";
  phaseEl.textContent = label;
}

function onLoadComplete() {
  overlay.style.display = "none";
  buildStack();
  buildSagittal(currentFrame, Math.round(CURSOR_FRAC * PROC_W));
}

const params = new URLSearchParams(window.location.search);
const jobId  = params.get("job_id");

if (N_FRAMES > 0 && !jobId) {
  // Already cached — show immediately
  onLoadComplete();
} else if (jobId) {
  // Connect WebSocket and wait for completion
  const wsProto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${wsProto}://${location.host}/ws/progress/${jobId}/`);

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.phase === "decode") {
      const pct = msg.total > 0 ? (msg.done / msg.total) * 100 : 0;
      setProgress(pct, `Decoding frames… ${msg.done}/${msg.total}`);
    } else if (msg.phase === "storing") {
      setProgress(95, "Storing frames…");
    } else if (msg.phase === "complete") {
      setProgress(100, "Done!");
      // Reload page without job_id so it hits the cache
      window.location.href = `/viewer/${STUDY_ID}/`;
    } else if (msg.phase === "error") {
      phaseEl.textContent = "Error: " + msg.msg;
      phaseEl.style.color = "#e74c3c";
    } else if (msg.phase === "init") {
      setProgress(0, msg.msg);
    }
  };

  ws.onerror = () => {
    phaseEl.textContent = "Connection error — please refresh.";
  };
} else {
  // No job_id and no frames — trigger load
  fetch(`/api/load/${STUDY_ID}/`, {
    method: "POST",
    headers: {"X-CSRFToken": getCookie("csrftoken")},
  }).then(r => r.json()).then(data => {
    if (data.status === "ready") {
      onLoadComplete();
    } else {
      window.location.href = `/viewer/${STUDY_ID}/?job_id=${data.job_id}`;
    }
  });
}

function getCookie(name) {
  const m = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
  return m ? m[2] : "";
}
</script>
{% endblock %}
